version: "3.9"

# ── Shared env file ─────────────────────────────────────────────────────────
x-app-env: &app-env
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://adx:${POSTGRES_PASSWORD:-adxpass}@postgres:5432/banking
    REDIS_URL: redis://redis:6379/0

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: adx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adxpass}
      POSTGRES_DB: banking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adx -d banking"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI (API server) ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    <<: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_data
      - hf_cache:/app/.cache/huggingface
    environment:
      GUNICORN_WORKERS: 2

  # ── Celery worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    <<: *app-env
    command: celery -A app.config.celery.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_data
      - hf_cache:/app/.cache/huggingface


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  hf_cache:
